name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        default: '1.0.0'
        description: 'Mod Version'
        required: true
        type: string
      release-type:
        default: 'release'
        description: 'The release channel for this version'
        required: true
        type: choice
        options:
          - 'release'
          - 'beta'
          - 'alpha'
      create-github-release:
        default: true
        description: 'Create a GitHub release?'
        required: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  attestations: write
  contents: write
  id-token: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Setup JDK 25
        uses: actions/setup-java@v5.4.0
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.2.0

      - name: Build with Gradle
        run: chmod u+x ./gradlew && ./gradlew build --no-daemon

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: 'artifact'
          path: build/libs/*
          retention-days: 1
          compression-level: 9

      - name: Generate artifact attestation
        uses: actions/attest@v4.1.1
        with:
          subject-path: build/libs/*

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: inputs.create-github-release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: 'artifact'
          path: artifacts

      - name: Create release tag
        id: tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          PREVIOUS_TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          RELEASE_TAG="v${{ inputs.version }}"
          
          echo "previous_tag=$PREVIOUS_TAG" >> "$GITHUB_OUTPUT"
          
          git tag -a "$RELEASE_TAG" -m "Release $RELEASE_TAG" HEAD
          git push origin "$RELEASE_TAG"
          
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Install git-cliff
        uses: taiki-e/install-action@git-cliff

      - name: Generate a changelog
        run: |
          if [ -z "${{ steps.tag.outputs.previous_tag }}" ]; then
            echo "First release" > CHANGELOG.md
          else
            git-cliff --verbose --output CHANGELOG.md --strip all -- ${{ steps.tag.outputs.previous_tag }}..${{ steps.tag.outputs.release_tag }}
          fi

      - name: Verify attestations
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for jar in artifacts/*.jar; do
            gh attestation verify "$jar" --repo "${{ github.repository }}"
          done
          
          cat >> CHANGELOG.md << 'EOF'
          
          ## ✅ Artifact Attestation
          
          The release JARs have been automatically verified by this project's GitHub Actions workflow using GitHub Artifact Attestations, confirming that they are authentic artifacts produced by the official CI pipeline.
          EOF

      - name: Create GitHub release
        id: release_github
        continue-on-error: true
        uses: softprops/action-gh-release@v3.0.1
        with:
          body_path: CHANGELOG.md
          draft: true
          files: 'artifacts/*.jar'
          name: "MovingWindow ${{ steps.tag.outputs.release_tag }}"
          tag_name: ${{ steps.tag.outputs.release_tag }}
        if: inputs.create-github-release

      - name: Set the release to “Published”
        id: publish_github
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        if: inputs.create-github-release
        run: |
          if [ "${{ inputs.release-type }}" == "release" ]; then
            gh release edit "${{ steps.tag.outputs.release_tag }}" --draft=false --latest --verify-tag --repo "${{ github.repository }}"
          elif [ "${{ inputs.release-type }}" == "beta" ] || [ "${{ inputs.release-type }}" == "alpha" ]; then
            gh release edit "${{ steps.tag.outputs.release_tag }}" --draft=false --prerelease --verify-tag --repo "${{ github.repository }}"
          fi
